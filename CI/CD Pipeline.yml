name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Files
        run: ls -la

      - name: Validate HTML Files
        run: |
          echo "Checking HTML files..."
          find . -name "*.html"

      - name: Build Success
        run: echo "Website build successful!"
